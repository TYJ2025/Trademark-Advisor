<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trademark Strategist & Portfolio Advisor</title>
<style>
  :root {
    --navy: #0f172a;
    --navy-light: #1e293b;
    --teal: #0ea5e9;
    --teal-dark: #0284c7;
    --gold: #f59e0b;
    --gold-light: #fbbf24;
    --red: #ef4444;
    --orange: #f97316;
    --green: #10b981;
    --bg: #f8fafc;
    --card: #ffffff;
    --card-hover: #f1f5f9;
    --text: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --input-bg: #f1f5f9;
    --accent-gradient: linear-gradient(135deg, #0ea5e9, #6366f1);
    --accent-purple: #6366f1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    padding: 20px 40px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #0ea5e9, #6366f1, #0ea5e9);
  }
  .header-icon {
    width: 44px; height: 44px; background: var(--accent-gradient);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); flex-shrink: 0;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: #94a3b8; margin-top: 1px; }
  .header-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .lang-toggle {
    display: flex; gap: 2px; background: rgba(255,255,255,0.1);
    border-radius: 8px; padding: 3px;
  }
  .lang-btn {
    padding: 5px 14px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .lang-btn.active { background: rgba(255,255,255,0.9); color: #0f172a; }
  .lang-btn:not(.active) { background: transparent; color: #94a3b8; }
  .load-btn {
    padding: 7px 16px; background: rgba(14,165,233,0.2); border: 1px solid rgba(14,165,233,0.4);
    border-radius: 8px; color: #38bdf8; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .load-btn:hover { background: rgba(14,165,233,0.3); }
  .load-btn input { display: none; }

  /* ── CLIENT INFO BAR ── */
  .client-bar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 40px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .client-bar .client-name { font-size: 16px; font-weight: 700; color: var(--navy); }
  .client-bar .client-meta { font-size: 13px; color: var(--text-muted); }
  .client-bar .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: rgba(14,165,233,0.1); color: var(--teal); border: 1px solid rgba(14,165,233,0.2);
  }

  /* ── MAIN CONTENT ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 24px 80px; }

  /* ── SUMMARY DASHBOARD ── */
  .summary-bar {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    border-radius: 16px; padding: 20px 24px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .summary-stat { text-align: center; }
  .summary-stat .val { font-size: 28px; font-weight: 700; color: #38bdf8; }
  .summary-stat .val.risk-val-high { color: #f87171; }
  .summary-stat .val.risk-val-medium { color: #fbbf24; }
  .summary-stat .val.risk-val-low { color: #34d399; }
  .summary-stat .desc {
    font-size: 11px; color: #94a3b8; text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 4px;
  }

  /* ── REPORT SECTIONS ── */
  .report-section {
    background: var(--card); border-radius: 16px; border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden;
    margin-bottom: 20px; animation: fadeSlideIn 0.4s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-header {
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
  }
  .section-header:hover { background: var(--card-hover); }
  .section-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .section-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
  .section-header .step-num {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .section-body { padding: 20px; }
  .section-body.collapsed { display: none; }

  /* ── ADVICE ITEMS ── */
  .advice-item {
    padding: 12px 16px; margin-bottom: 10px; background: var(--input-bg);
    border-radius: 8px; border-left: 3px solid var(--teal);
    font-size: 14px; line-height: 1.7;
  }
  .advice-item.warning { border-left-color: var(--orange); }
  .advice-item.danger { border-left-color: var(--red); }
  .advice-item.success { border-left-color: var(--green); }
  .advice-item strong { color: var(--teal); }
  .advice-item .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 4px; display: block;
  }

  /* ── RISK BADGES ── */
  .risk-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .risk-low { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
  .risk-medium { background: #fff7ed; color: #d97706; border: 1px solid #fed7aa; }
  .risk-high { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

  /* ── TABLES ── */
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .data-table th {
    text-align: left; padding: 10px 12px; color: var(--text-muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border); background: var(--input-bg);
  }
  .data-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  .data-table tbody tr { cursor: pointer; transition: background 0.15s; }
  .data-table tbody tr:hover { background: var(--card-hover); }
  .data-table tr:last-child td { border-bottom: none; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 6px;
  }
  .status-dot.registered { background: var(--green); }
  .status-dot.pending { background: var(--gold); }
  .status-dot.expired { background: var(--red); }

  /* ── NICE CLASS GRID ── */
  .nice-class-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px;
  }
  .nice-chip {
    padding: 8px 12px; background: var(--input-bg); border-radius: 8px;
    font-size: 13px; border: 1px solid var(--border);
  }
  .nice-chip.current { border-color: var(--teal); }
  .nice-chip.suggested { border-color: var(--gold); border-style: dashed; }
  .nice-chip .chip-label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }

  /* ── USE VS REG COMPARISON ── */
  .use-vs-reg-card {
    background: linear-gradient(135deg, rgba(249,115,22,0.05), rgba(239,68,68,0.05));
    border: 1px solid rgba(249,115,22,0.2); border-radius: 12px; padding: 16px; margin-bottom: 10px;
  }
  .use-vs-reg-card h4 { color: var(--orange); font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .comparison-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0;
  }
  .comparison-col {
    padding: 10px; background: rgba(255,255,255,0.7); border-radius: 8px; font-size: 13px;
  }
  .comparison-col .col-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 4px;
  }

  /* ── MARK DETAIL OVERLAY ── */
  .mark-detail-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.5); z-index: 100;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 20px; overflow-y: auto;
  }
  .mark-detail-panel {
    background: var(--bg); border-radius: 20px; max-width: 900px; width: 100%;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .mark-detail-header {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    padding: 20px 24px; border-radius: 20px 20px 0 0;
    display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 1;
  }
  .mark-detail-header h2 { color: #fff; font-size: 18px; flex: 1; }
  .mark-detail-header .close-btn {
    background: rgba(255,255,255,0.1); border: none; color: #94a3b8;
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .mark-detail-header .close-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .mark-detail-body { padding: 24px; }

  /* ── BACK TO TOP ── */
  .fab {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; background: var(--accent-gradient); color: #fff;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(14,165,233,0.3);
    z-index: 50; transition: transform 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .fab:hover { transform: translateY(-2px); }

  /* ── PLACEHOLDER ── */
  .placeholder-msg {
    background: var(--card); border-radius: 16px; border: 1px dashed var(--border);
    padding: 80px 40px; text-align: center; color: var(--text-muted); font-size: 15px; line-height: 1.8;
  }
  .placeholder-msg .icon { font-size: 48px; margin-bottom: 16px; }

  /* ── DEMO BANNER ── */
  .demo-banner {
    background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(251,191,36,0.1));
    border: 1px solid rgba(249,115,22,0.3); border-radius: 12px;
    padding: 14px 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px; font-size: 14px;
    color: var(--orange); line-height: 1.6;
  }
  .demo-banner .demo-icon { font-size: 22px; flex-shrink: 0; }
  .demo-banner .demo-text strong { color: var(--text); }
  .demo-banner .demo-dismiss {
    margin-left: auto; background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3);
    color: var(--orange); border-radius: 6px; padding: 4px 12px; font-size: 12px;
    cursor: pointer; font-weight: 600; white-space: nowrap;
  }
  .demo-banner .demo-dismiss:hover { background: rgba(249,115,22,0.25); }

  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .client-bar { padding: 12px 20px; }
    .main { padding: 16px; }
    .comparison-row { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: repeat(3, 1fr); }
  }
  @media print {
    .header, .fab, .load-btn, .new-analysis-btn { display: none !important; }
    .report-section { break-inside: avoid; }
    .mark-detail-overlay { position: static; background: none; padding: 0; }
    .mark-detail-panel { box-shadow: none; max-height: none; }
  }

  /* ── UPLOAD LANDING ── */
  .upload-landing { max-width: 900px; margin: 48px auto; padding: 0 24px; }
  .upload-landing-title {
    text-align: center; font-size: 28px; font-weight: 700;
    color: var(--navy); margin-bottom: 8px;
  }
  .upload-landing-sub {
    text-align: center; font-size: 15px; color: var(--text-muted);
    margin-bottom: 40px; line-height: 1.7;
  }
  .upload-zones {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;
  }
  .upload-zone {
    background: var(--card); border: 2px dashed var(--border); border-radius: 16px;
    padding: 40px 24px; text-align: center; cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .upload-zone:hover {
    border-color: var(--teal); background: rgba(14,165,233,0.02);
    transform: translateY(-2px); box-shadow: 0 8px 24px rgba(14,165,233,0.1);
  }
  .upload-zone.drag-over {
    border-color: var(--teal); background: rgba(14,165,233,0.06);
  }
  .upload-zone.uploaded {
    border-color: var(--green); border-style: solid; background: rgba(16,185,129,0.04);
  }
  .upload-zone.uploaded:hover {
    border-color: var(--green); box-shadow: 0 8px 24px rgba(16,185,129,0.1);
  }
  .upload-zone-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .upload-zone-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .upload-zone-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
  .upload-zone-action {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .upload-zone-action.primary {
    background: var(--accent-gradient); color: #fff;
    box-shadow: 0 4px 12px rgba(14,165,233,0.25);
  }
  .upload-zone-action.secondary {
    background: var(--input-bg); color: var(--text); border: 1px solid var(--border);
  }
  .upload-zone-action:hover { transform: translateY(-1px); }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone .check-badge {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; background: var(--green); color: #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; box-shadow: 0 2px 8px rgba(16,185,129,0.3);
  }
  .upload-zone .file-name {
    margin-top: 12px; font-size: 12px; color: var(--green); font-weight: 600;
  }
  .upload-divider {
    text-align: center; color: var(--text-muted); font-size: 13px;
    margin: 24px 0; position: relative;
  }
  .upload-divider::before, .upload-divider::after {
    content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border);
  }
  .upload-divider::before { left: 0; }
  .upload-divider::after { right: 0; }
  .demo-load-btn {
    display: flex; align-items: center; gap: 8px; margin: 0 auto;
    padding: 12px 28px; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text);
    cursor: pointer; transition: all 0.2s;
  }
  .demo-load-btn:hover { background: var(--border); }
  .generate-btn-wrap { text-align: center; margin-top: 28px; }
  .generate-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 40px; background: var(--accent-gradient); color: #fff;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 6px 20px rgba(14,165,233,0.3); transition: all 0.2s;
  }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(14,165,233,0.4); }
  .generate-btn:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
    box-shadow: 0 2px 8px rgba(14,165,233,0.15);
  }

  /* ── AUTO-SEARCH BAR ── */
  .auto-search-bar {
    background: linear-gradient(135deg, rgba(14,165,233,0.06), rgba(99,102,241,0.06));
    border: 1px solid rgba(14,165,233,0.2); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px; animation: fadeSlideIn 0.4s ease;
  }
  .auto-search-spinner {
    width: 22px; height: 22px; border: 3px solid rgba(14,165,233,0.2);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auto-search-bar .search-text { font-size: 14px; color: var(--teal); font-weight: 600; flex: 1; }
  .auto-search-bar .search-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .auto-search-bar.complete {
    background: linear-gradient(135deg, rgba(16,185,129,0.06), rgba(14,165,233,0.06));
    border-color: rgba(16,185,129,0.3);
  }
  .auto-search-bar.complete .search-text { color: var(--green); }

  /* ── NEW ANALYSIS BUTTON (header) ── */
  .new-analysis-btn {
    padding: 7px 16px; background: rgba(14,165,233,0.2); border: 1px solid rgba(14,165,233,0.4);
    border-radius: 8px; color: #38bdf8; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .new-analysis-btn:hover { background: rgba(14,165,233,0.3); }

  @media (max-width: 768px) {
    .upload-zones { grid-template-columns: 1fr; }
    .upload-landing-title { font-size: 22px; }
  }
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

</div>

<div class="client-bar" id="clientBar" style="display:none;"></div>
<div class="main" id="app"></div>

function normalizeStatus(str) {
  const s = (str||'').toLowerCase().trim();
  if (!s) return '';
  // Chinese: unregistered (check first — '未註冊' contains '註冊')
  if (s.includes('未註冊') || s.includes('未注册')) return 'unregistered';
  // Chinese: registered
  if (s.includes('已註冊') || s.includes('已注册') || s.includes('核准') || s.includes('有效')
    || s.includes('存續') || s.includes('生效') || s.includes('活躍') || s.includes('獲准')
    || s.includes('註冊公告') || s.includes('注册公告')
    || (s.includes('註冊') && !s.includes('未') && !s.includes('後') && !s.includes('后') && !s.includes('待'))
    || (s.includes('注册') && !s.includes('未') && !s.includes('后') && !s.includes('待'))) return 'registered';
  // Chinese: post-reg
  if (s.includes('註冊後') || s.includes('注册后') || s.includes('維護') || s.includes('维护')) return 'post-reg';
  // Chinese: intent
  if (s.includes('意圖使用') || s.includes('意图使用')) return 'intent';
  // Chinese: published
  if (s.includes('公告') || s.includes('異議') || s.includes('异议') || s.includes('公示')) return 'published';
  // Chinese: renewal
  if (s.includes('續展') || s.includes('续展') || s.includes('待續') || s.includes('待续') || s.includes('到期')) return 'renewal';
  // Chinese: pending
  if (s.includes('審查') || s.includes('审查') || s.includes('待審') || s.includes('待审')
    || s.includes('申請中') || s.includes('申请中') || s.includes('審理') || s.includes('审理')) return 'pending';
  // English
  if (s.includes('register') && !s.includes('un') && !s.includes('post')) return 'registered';
  if (s.includes('active') || s.includes('valid') || s.includes('granted') || s.includes('approved') || s.includes('alive')) return 'registered';
  if (s.includes('post')||s.includes('sec')) return 'post-reg';
  if (s.includes('intent')||s.includes('itu')||s.includes('1b')) return 'intent';
  if (s.includes('publish')||s.includes('opposition')) return 'published';
  if (s.includes('renew')||s.includes('expir')) return 'renewal';
  if (s.includes('unregist')||s.includes('common')) return 'unregistered';
  if (s.includes('pending')||s.includes('exam')||s.includes('filed')) return 'pending';
  return '';
}

function normalizeMarkType(str) {
  const s = (str||'').toLowerCase();
  if (s.includes('design')||s.includes('logo')) return 'design';
  if (s.includes('composite')||s.includes('combo')) return 'composite';
  if (s.includes('sound')) return 'sound';
  return 'word';
}

function parseClasses(str) {
  if (!str) return [];
  return String(str)
    .replace(/[Cc]lass\s*/g,'')
    .replace(/第/g,'').replace(/[類类]\s*/g,'')
    .split(/[,;|、／\/]/)
    .map(c=>parseInt(c.trim()))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);
}

function parseJurisdictions(str) {
  if (!str) return [];
  return String(str).split(/[,;|、／\/]/).map(j=>j.trim().toUpperCase()).filter(Boolean);
}

function normalizeMark(obj) {
  const get = function() {
    for (let i=0; i<arguments.length; i++) {
      const k = arguments[i];
      if (obj[k]) return obj[k];
      if (obj[k.toLowerCase()]) return obj[k.toLowerCase()];
    }
    return '';
  };
  var rawStatus = normalizeStatus(get('status','mark_status','current_status'));
  var regDate = get('registration_date','regdate','reg_date','registered_date');
  var regNumber = get('reg_number','registration_number','reg_no');
  // Infer status from other fields when status column is missing or unrecognized
  if (!rawStatus) {
    if (regDate || regNumber) rawStatus = 'registered';
    else rawStatus = 'pending';
  }
  return {
    mark: get('mark','trademark','mark_name','name','brand') || 'UNNAMED',
    client: get('client','client_name','owner','applicant') || '',
    markType: normalizeMarkType(get('type','mark_type')),
    status: rawStatus,
    jurisdictions: parseJurisdictions(get('jurisdiction','jurisdictions','office','country')),
    classes: parseClasses(get('classes','class','nice_class','nice_classes','classification')),
    filingDate: get('filing_date','filingdate','filed','priority_date','application_date'),
    regDate: regDate,
    goodsServices: get('goods_services','goods','services','description','goods_and_services'),
    concerns: get('concerns','issues','notes','questions'),
    serialNumber: get('serial_number','serial','application_number','app_no'),
    regNumber: regNumber,
    expansion: get('expansion','expansion_plans','growth'),
    competitors: get('competitors','conflicts','similar_marks'),
  };
}

function computeRisk(m) {
  let score = 0;
  if (m.status==='unregistered') score += 35;
  if (m.status==='intent') score += 15;
  if (m.status==='renewal') score += 20;
  if (m.status==='post-reg') score += 15;
  if (m.status==='published') score += 10;
  if (m.jurisdictions.length<=1) score += 5;
  if (m.classes.length<=1) score += 5;
  if (m.regDate) {
    const y = (new Date()-new Date(m.regDate))/(365.25*24*3600000);
    if (y>=4.5&&y<6) score += 15;
    if (y>=9&&y<10) score += 20;
  }
  return score>=50?'HIGH':score>=25?'MEDIUM':'LOW';
}

function handleRegDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');

  if (file) readFileAsRegistration(file);
}
function handleUseDrop(event) {

  event.currentTarget.classList.remove('drag-over');
  var file = event.dataTransfer.files[0];
  if (file) readFileAsUsage(file);
}

function handleRegistrationUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  readFileAsRegistration(file);
  event.target.value = '';
}

function handleUsageUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  readFileAsUsage(file);
  event.target.value = '';
}

function isExcelFile(filename) {
  return /\.(xlsx|xls|csv)$/i.test(filename);
}

function readFileAsRegistration(file) {
  regFileName = file.name;
  if (isExcelFile(file.name)) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        registrationData = parseExcelToPortfolio(e.target.result, file.name);
        updateUploadZoneState('reg');
      } catch(err) { alert('Excel parse error: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  } else {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        registrationData = JSON.parse(e.target.result);
        updateUploadZoneState('reg');
      } catch(err) { alert('JSON parse error: ' + err.message); }
    };
    reader.readAsText(file);
  }
}

function readFileAsUsage(file) {
  useFileName = file.name;
  if (isExcelFile(file.name)) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        usageData = parseExcelToUsage(e.target.result, file.name);

}

// EXCEL PARSING — convert spreadsheet to portfolio JSON
// ═══════════════════════════════════════════════
function parseExcelToPortfolio(arrayBuffer, filename) {
  var wb = XLSX.read(arrayBuffer, { type: 'array' });

  // Try to find a "marks" or "trademarks" sheet, or use first sheet
  var sheetName = wb.SheetNames[0];
  wb.SheetNames.forEach(function(name) {
    var lower = name.toLowerCase();
    if (lower.includes('mark') || lower.includes('trademark') || lower.includes('商標') || lower.includes('註冊')) {
      sheetName = name;
    }
  });

  var sheet = wb.Sheets[sheetName];
  var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
  if (!rows || rows.length === 0) throw new Error('No data found in sheet: ' + sheetName);

  // Map column headers flexibly (support EN/ZH headers)
  var marks = rows.map(function(row) {
    var obj = {};
    Object.keys(row).forEach(function(key) {
      var k = key.toLowerCase().trim();
      var v = String(row[key]).trim();
      if (!v) return;

      // Map known column names to standard fields
      // IMPORTANT: check mark LAST because '商標' is a substring of many Chinese column names
      // (e.g. '商標狀態', '商標類別', '商標類型') — checking it first would hijack those fields
      if (matchCol(k, ['status','mark_status','current_status','狀態','註冊狀態','商標狀態','案件狀態','權利狀態'])) obj.status = v;
      else if (matchCol(k, ['client','owner','applicant','client_name','申請人','權利人','客戶','商標權人','所有人','持有人'])) obj.client = v;
      else if (matchCol(k, ['type','mark_type','類型','商標類型','型態'])) obj.type = v;
      else if (matchCol(k, ['jurisdiction','jurisdictions','office','country','管轄','管轄區','國家','地區','註冊局','申請地'])) obj.jurisdiction = v;
      else if (matchCol(k, ['class','classes','nice_class','nice_classes','classification','類別','尼斯分類','商標類別','國際分類'])) obj.classes = v;
      else if (matchCol(k, ['filing_date','filingdate','filed','application_date','priority_date','申請日','申請日期'])) obj.filing_date = formatExcelDate(row[key]);
      else if (matchCol(k, ['registration_date','regdate','reg_date','registered_date','註冊日','註冊日期','核准日','公告日期'])) obj.registration_date = formatExcelDate(row[key]);
      else if (matchCol(k, ['goods_services','goods','services','description','goods_and_services','商品','服務','商品服務','商品及服務','指定商品','商品名稱','服務名稱'])) obj.goods_services = v;
      else if (matchCol(k, ['serial_number','serial','application_number','app_no','申請號','案號','申請案號'])) obj.serial_number = v;
      else if (matchCol(k, ['reg_number','registration_number','reg_no','註冊號','註冊證號','註冊號碼','證書號'])) obj.reg_number = v;
      else if (matchCol(k, ['concerns','issues','notes','questions','備註','問題','注意事項'])) obj.concerns = v;
      else if (matchCol(k, ['expansion','expansion_plans','growth','擴張','擴展計畫'])) obj.expansion = v;
      else if (matchCol(k, ['competitors','conflicts','similar_marks','競爭者','衝突','近似商標'])) obj.competitors = v;
      else if (matchCol(k, ['mark','trademark','商標','商標名稱','brand','mark_name','name','名稱'])) obj.mark = v;
    });
    return obj;
  }).filter(function(m) { return m.mark; }); // Only include rows that have a mark name

  // Try to extract client info from a separate sheet
  var clientInfo = null;
  wb.SheetNames.forEach(function(name) {
    var lower = name.toLowerCase();
    if (lower.includes('client') || lower.includes('info') || lower.includes('客戶') || lower.includes('基本')) {
      var infoSheet = wb.Sheets[name];
      var infoRows = XLSX.utils.sheet_to_json(infoSheet, { defval: '' });
      if (infoRows.length > 0) {
        clientInfo = parseClientInfoFromRows(infoRows);
      }
    }
  });

  var result = { marks: marks };
  if (clientInfo) result.client_info = clientInfo;
  return result;
}

function parseExcelToUsage(arrayBuffer, filename) {
  var wb = XLSX.read(arrayBuffer, { type: 'array' });
  var result = { actual_use_analysis: {} };

  // Look for variant / use analysis sheets
  wb.SheetNames.forEach(function(name) {
    var lower = name.toLowerCase();
    var sheet = wb.Sheets[name];
    var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows || rows.length === 0) return;

    if (lower.includes('variant') || lower.includes('變體') || lower.includes('差異')) {
      result.actual_use_analysis.mark_variants = rows.map(function(r) {
        return {
          registered: findVal(r, ['registered','註冊商標','registered_mark']) || '',
          actual_use: findVal(r, ['actual_use','actual','實際使用','使用版本']) || '',
          risk: (findVal(r, ['risk','risk_level','風險','風險等級']) || 'medium').toLowerCase()
        };
      }).filter(function(v) { return v.registered && v.actual_use; });
    }
    else if (lower.includes('scope') || lower.includes('goods') || lower.includes('範圍') || lower.includes('商品')) {
      if (rows.length > 0) {
        result.actual_use_analysis.goods_scope_comparison = {
          registered_scope: findVal(rows[0], ['registered_scope','註冊範圍','registered']) || '',
          actual_scope: findVal(rows[0], ['actual_scope','實際範圍','actual']) || '',
          gap_items: (findVal(rows[0], ['gap_items','缺口項目','gap']) || '').split(/[,;、]/).map(function(s){return s.trim();}).filter(Boolean),
          gap_classes: (findVal(rows[0], ['gap_classes','缺口分類','classes']) || '').split(/[,;、]/).map(function(s){return parseInt(s);}).filter(function(n){return !isNaN(n);})
        };
      }
    }
    else if (lower.includes('unreg') || lower.includes('未註冊') || lower.includes('使用中')) {
      result.actual_use_analysis.unregistered_marks_in_use = rows.map(function(r) {
        var name = findVal(r, ['mark','name','商標','名稱']) || '';
        var desc = findVal(r, ['description','desc','說明','備註']) || '';
        return name + (desc ? ' — ' + desc : '');
      }).filter(Boolean);
    }
    else {
      // Default: treat first sheet as marks data with usage info
      if (!result.marks) {
        var marks = rows.map(function(row) {
          var obj = {};
          Object.keys(row).forEach(function(key) {
            var k = key.toLowerCase().trim();
            var v = String(row[key]).trim();
            if (!v) return;
            // Check mark LAST to avoid '商標' substring matching other fields
            if (matchCol(k, ['status','狀態','商標狀態'])) obj.status = v;
            else if (matchCol(k, ['jurisdiction','管轄區'])) obj.jurisdiction = v;
            else if (matchCol(k, ['class','classes','類別','商標類別'])) obj.classes = v;
            else if (matchCol(k, ['goods_services','goods','商品服務'])) obj.goods_services = v;
            else if (matchCol(k, ['concerns','notes','備註'])) obj.concerns = v;
            else if (matchCol(k, ['mark','trademark','商標','名稱'])) obj.mark = v;
          });
          return obj;
        }).filter(function(m) { return m.mark; });
        if (marks.length > 0) result.marks = marks;
      }
    }
  });

  return result;
}

// Helper: flexible column name matching
function matchCol(colName, candidates) {
  for (var i = 0; i < candidates.length; i++) {
    if (colName === candidates[i] || colName.includes(candidates[i])) return true;
  }
  return false;
}

// Helper: find value from row by multiple possible keys
function findVal(row, keys) {
  for (var i = 0; i < keys.length; i++) {
    // Try exact match first
    if (row[keys[i]] !== undefined && row[keys[i]] !== '') return String(row[keys[i]]);
    // Try case-insensitive search across all columns
    var rowKeys = Object.keys(row);
    for (var j = 0; j < rowKeys.length; j++) {
      if (rowKeys[j].toLowerCase().includes(keys[i].toLowerCase()) && row[rowKeys[j]] !== '') {
        return String(row[rowKeys[j]]);
      }
    }
  }
  return '';
}

// Helper: parse client info from rows (key-value style)
function parseClientInfoFromRows(rows) {
  var info = {};
  rows.forEach(function(r) {
    var keys = Object.keys(r);
    // Support key-value pairs in two columns
    if (keys.length >= 2) {
      var key = String(r[keys[0]]).toLowerCase().trim();
      var val = String(r[keys[1]]).trim();
      if (!val) return;
      if (matchCol(key, ['name','公司','名稱','company'])) {
        if (/[\u4e00-\u9fff]/.test(val)) info.name_zh = val; else info.name_en = val;
      }
      else if (matchCol(key, ['industry','產業','行業'])) {
        if (/[\u4e00-\u9fff]/.test(val)) info.industry_zh = val; else info.industry_en = val;
      }
      else if (matchCol(key, ['founded','成立','創立'])) info.founded = val;
      else if (matchCol(key, ['headquarters','hq','總部','地址'])) {
        if (/[\u4e00-\u9fff]/.test(val)) info.headquarters_zh = val; else info.headquarters_en = val;
      }
    }
  });
  return Object.keys(info).length > 0 ? info : null;
}

// Helper: handle Excel date serial numbers
function formatExcelDate(val) {
  if (!val) return '';
  // If it's already a string date, return as-is
  if (typeof val === 'string' && val.match(/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/)) return val;
  // Excel serial number
  if (typeof val === 'number' && val > 10000) {
    var d = new Date((val - 25569) * 86400000);
    return d.toISOString().split('T')[0];
  }
  return String(val);
}

// REPORT GENERATION (merge reg + usage + auto-search)
// ═══════════════════════════════════════════════
function generateReport() {
  if (!registrationData) return;
  isDemo = false;

  // Merge registration data as the base
  var merged = JSON.parse(JSON.stringify(registrationData));

  // If user uploaded usage data, merge it in
  if (usageData) {
    if (usageData.actual_use_analysis) {
      merged.actual_use_analysis = usageData.actual_use_analysis;
    }
    // Also merge any additional marks from usage data
    if (usageData.marks) {
      merged.marks = (merged.marks || []).concat(usageData.marks);
    }
  }

  // Load the portfolio first so normalizedMarks is ready
  loadPortfolioData(merged);

  // If no usage data was uploaded, run auto-search
  if (!usageData || !usageData.actual_use_analysis) {
    startAutoSearch(merged);
  }
}

function loadPortfolioData(data) {
  currentData = data;
  var marks = [];
  if (data.marks) marks = data.marks;
  else if (data.portfolio) marks = data.portfolio;
  else if (data.trademarks) marks = data.trademarks;
  else if (Array.isArray(data)) marks = data;
  else marks = [data];
  normalizedMarks = marks.map(normalizeMark);
  renderAll(data);
}

// AUTO-SEARCH: simulate online trademark search
// ═══════════════════════════════════════════════
function startAutoSearch(data) {
  var app = document.getElementById('app');
  var searchBar = document.createElement('div');
  searchBar.className = 'auto-search-bar';
  searchBar.id = 'autoSearchBar';
  searchBar.innerHTML =
    '<div class="auto-search-spinner"></div>' +
    '<div><div class="search-text">' + t('autoSearching') + '</div>' +
    '<div class="search-detail" id="autoSearchDetail">' + t('autoSearchStep1') + '</div></div>';
  // Insert after the summary bar
  var summaryBar = app.querySelector('.summary-bar');
  if (summaryBar && summaryBar.nextSibling) {
    app.insertBefore(searchBar, summaryBar.nextSibling);
  } else {
    app.insertBefore(searchBar, app.firstChild);
  }

  var steps = [
    { text: t('autoSearchStep1'), delay: 1200 },
    { text: t('autoSearchStep2'), delay: 1400 },
    { text: t('autoSearchStep3'), delay: 1000 },
    { text: t('autoSearchStep4'), delay: 1200 }
  ];

  var stepIndex = 0;
  function advanceStep() {
    stepIndex++;
    if (stepIndex < steps.length) {
      var detail = document.getElementById('autoSearchDetail');
      if (detail) detail.textContent = steps[stepIndex].text;
      setTimeout(advanceStep, steps[stepIndex].delay);
    } else {
      completeAutoSearch(data);
    }
  }
  setTimeout(advanceStep, steps[0].delay);
}

function completeAutoSearch(data) {
  // Generate usage analysis from the registration data
  autoSearchResults = generateAutoUsageAnalysis(normalizedMarks, data.client_info);

  // Update the search bar to complete state
  var bar = document.getElementById('autoSearchBar');
  if (bar) {
    bar.className = 'auto-search-bar complete';
    bar.innerHTML =
      '<div style="font-size:20px;flex-shrink:0;">&#9989;</div>' +
      '<div class="search-text">' + t('autoSearchComplete') + '</div>';
  }

  // Merge auto-search results into current data and re-render the use-vs-reg section
  if (!currentData.actual_use_analysis) {
    currentData.actual_use_analysis = autoSearchResults;
  }

  // Insert the auto-generated use-vs-reg section into the page
  var app = document.getElementById('app');
  var barEl = document.getElementById('autoSearchBar');
  if (barEl) {
    var wrapper = document.createElement('div');
    wrapper.innerHTML = renderAutoSearchSection(autoSearchResults);
    barEl.parentNode.insertBefore(wrapper, barEl.nextSibling);
  }
}

// ═══════════════════════════════════════════════
// AUTO-GENERATE USAGE ANALYSIS from reg data
// ═══════════════════════════════════════════════
function generateAutoUsageAnalysis(marks, clientInfo) {
  var isZh = currentLang === 'zh';
  var analysis = {
    mark_variants: [],
    goods_scope_comparison: null,
    unregistered_marks_in_use: []
  };

  var registered = marks.filter(function(m) { return m.status === 'registered' || m.status === 'post-reg'; });
  var unregistered = marks.filter(function(m) { return m.status === 'unregistered'; });

  // Generate plausible mark variants found online
  var seenMarks = {};
  registered.forEach(function(m) {
    if (seenMarks[m.mark]) return;
    seenMarks[m.mark] = true;
    var hasChinese = /[\u4e00-\u9fff]/.test(m.mark);
    var hasEnglish = /[a-zA-Z]/.test(m.mark);
    var hasSpecial = /[&\s]/.test(m.mark);

    if (hasChinese && hasEnglish) {
      analysis.mark_variants.push({
        registered: m.mark,
        actual_use: m.mark.replace(/\s+/g, '') + (isZh ? '（線上平台常見簡化版本，無空格）' : ' (simplified version common on online platforms, no spaces)'),
        risk: 'medium'
      });
    } else if (hasEnglish && hasSpecial) {
      analysis.mark_variants.push({
        registered: m.mark,
        actual_use: m.mark.replace(/[&]/g, '').replace(/\s+/g, '') + (isZh ? '（社群媒體及 hashtag 使用版本）' : ' (social media and hashtag version)'),
        risk: 'low'
      });
    } else if (hasChinese && m.mark.length >= 2) {
      // Chinese-only marks: suggest abbreviated or stylized variants
      analysis.mark_variants.push({
        registered: m.mark,
        actual_use: m.mark + (isZh ? '（電商平台、社群媒體可能出現之簡稱或設計變體）' : ' (abbreviated or stylized variant on e-commerce/social media)'),
        risk: 'low'
      });
    } else if (hasEnglish) {
      analysis.mark_variants.push({
        registered: m.mark,
        actual_use: m.mark.toLowerCase() + (isZh ? '（網路使用小寫版本）' : ' (lowercase version used online)'),
        risk: 'low'
      });
    }
  });

  // Identify unregistered marks in use
  unregistered.forEach(function(m) {
    var desc = m.concerns || m.goodsServices || '';
    analysis.unregistered_marks_in_use.push(m.mark + (desc ? ' — ' + desc : ''));
  });

  // Goods scope comparison
  var allGoods = registered.map(function(m) { return m.goodsServices; }).filter(Boolean);
  var allClasses = [];
  var classSet = {};
  marks.forEach(function(m) {
    m.classes.forEach(function(c) { if (!classSet[c]) { classSet[c] = true; allClasses.push(c); } });
  });
  allClasses.sort(function(a,b) { return a-b; });

  // Build registered scope from goods/services or fall back to class descriptions
  var registeredScope = '';
  if (allGoods.length > 0) {
    registeredScope = allGoods.join(isZh ? '；' : '; ');
  } else if (allClasses.length > 0) {
    registeredScope = allClasses.map(function(c) {
      return (isZh ? '第' + c + '類 ' : 'Class ' + c + ': ') + niceLabel(c);
    }).join(isZh ? '；' : '; ');
  }

  if (registeredScope || allClasses.length > 0) {
    var suggestedItems = isZh
      ? ['線上銷售通路', '社群媒體行銷推廣', '跨境電商服務', '數位廣告素材']
      : ['Online retail channels', 'Social media marketing', 'Cross-border e-commerce', 'Digital advertising assets'];

    var suggestedClasses = [];
    var sugClassSet = {};
    allClasses.forEach(function(c) {
      (EXPANSION_MAP[c] || []).forEach(function(s) {
        if (!classSet[s] && !sugClassSet[s]) { sugClassSet[s] = true; suggestedClasses.push(s); }
      });
    });

    analysis.goods_scope_comparison = {
      registered_scope: registeredScope || (isZh ? '（未提供商品服務說明）' : '(No goods/services description provided)'),
      actual_scope: (registeredScope || '') + (registeredScope ? (isZh ? '、' : ', ') : '') + suggestedItems.join(isZh ? '、' : ', '),
      gap_items: suggestedItems,
      gap_classes: suggestedClasses.slice(0, 4)
    };
  }

  return analysis;
}

    if (gsc.gap_classes && gsc.gap_classes.length) {

  // Unregistered marks in use
  if (analysis.unregistered_marks_in_use && analysis.unregistered_marks_in_use.length) {
    html += '<div class="advice-item danger"><span class="label">' + t('unregInUse') + '</span>' +
      '<p style="margin-bottom:8px;">' + t('unregWarning') + '</p>';
    analysis.unregistered_marks_in_use.forEach(function(m, i) {
      html += '<div style="padding:8px 12px;background:rgba(239,68,68,0.05);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--red);font-size:13px;">' + (i+1) + '. ' + m + '</div>';
    });
    html += '</div>';

    html += '<div class="advice-item warning"><span class="label">' + t('filingPriority') + '</span>' + t('filingPriorityText') + '</div>';
  }

  html += '</div></div>';
  return html;
}

    let barHTML = '<div class="client-name">'+(isZh?(ci.name_zh||ci.name_en||''):(ci.name_en||ci.name_zh||''))+'</div>';
    const meta = [];
    if (ci.industry_zh||ci.industry_en) meta.push('<span class="tag">'+(isZh?ci.industry_zh:ci.industry_en)+'</span>');

    analysis.mark_variants.forEach(function(v) {
      const riskColor = v.risk==='high'?'var(--red)':v.risk==='medium'?'var(--orange)':'var(--green)';
      html += '<div class="use-vs-reg-card">' +
        '<div class="comparison-row">' +
        '<div class="comparison-col"><div class="col-label">'+t('regMark')+'</div><strong>'+v.registered+'</strong></div>' +
        '<div class="comparison-col"><div class="col-label">'+t('actualUse')+'</div><strong>'+v.actual_use+'</strong></div>' +

    });
    const isZh = currentLang==='zh';
    html += '<div style="margin-top:8px;font-size:13px;color:var(--text-muted);">'+(isZh
      ? '\u26a0 \u5546\u6a19\u8b8a\u9ad4\u8207\u8a3b\u518a\u5546\u6a19\u4e4b\u9593\u7684\u5dee\u7570\u53ef\u80fd\u5c0e\u81f4\u4f7f\u7528\u8b49\u64da\u4e0d\u88ab\u63a5\u53d7\u3001\u653e\u68c4\u98a8\u96aa\u6216\u4fdd\u8b77\u7bc4\u570d\u7e2e\u9650\u3002\u5efa\u8b70\u5c31\u5be6\u969b\u4f7f\u7528\u4e4b\u7248\u672c\u63d0\u51fa\u65b0\u7684\u5546\u6a19\u7533\u8acb\u3002'
      : '\u26a0 Discrepancies between mark variants and registrations may result in specimen rejection, abandonment risk, or narrowed protection. Recommend filing new applications for the versions actually in use.')+'</div>';
    html += '</div>';
  }

  // Goods scope mismatch
  if (analysis.goods_scope_comparison) {
    const gsc = analysis.goods_scope_comparison;
    html += '<div class="advice-item warning"><span class="label">'+t('goodsScopeMismatch')+'</span>' +
      '<div class="comparison-row">' +
      '<div class="comparison-col"><div class="col-label">'+t('regScope')+'</div>'+gsc.registered_scope+'</div>' +
      '<div class="comparison-col"><div class="col-label">'+t('actualScope')+'</div>'+gsc.actual_scope+'</div></div>';
    if (gsc.gap_items && gsc.gap_items.length) {
      html += '<div style="margin-top:8px;"><strong style="color:var(--red);">'+t('gapItems')+':</strong> '+gsc.gap_items.join('\u3001')+'</div>';
    }
    if (gsc.gap_classes && gsc.gap_classes.length) {
      html += '<div style="margin-top:4px;"><strong style="color:var(--orange);">'+t('gapClasses')+':</strong> '+gsc.gap_classes.map(function(c){return 'Class '+c+' ('+niceLabel(c)+')';}).join(', ')+'</div>';
    }
    html += '</div>';
  }

  // Unregistered marks in use
  if (analysis.unregistered_marks_in_use && analysis.unregistered_marks_in_use.length) {
    html += '<div class="advice-item danger"><span class="label">'+t('unregInUse')+'</span>' +
      '<p style="margin-bottom:8px;">'+t('unregWarning')+'</p>';
    analysis.unregistered_marks_in_use.forEach(function(m,i) {
      html += '<div style="padding:8px 12px;background:rgba(239,68,68,0.05);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--red);font-size:13px;">'+(i+1)+'. '+m+'</div>';
    });
    html += '</div>';

    // Filing priority
    html += '<div class="advice-item warning"><span class="label">'+t('filingPriority')+'</span>'+t('filingPriorityText')+'</div>';
  }

  html += '</div></div>';
  return html;
}

// ═══════════════════════════════════════════════
// GAP ANALYSIS
// ═══════════════════════════════════════════════
function renderGapAnalysis(allClasses, allJuris) {
  const suggestedClasses = new Set();
  allClasses.forEach(function(c) { (EXPANSION_MAP[c]||[]).forEach(function(s) { if (allClasses.indexOf(s)===-1) suggestedClasses.add(s); }); });

  let html = '<div class="report-section">' +
    '<div class="section-header" onclick="toggleSection(this)">' +
    '<div class="section-icon" style="background:rgba(245,158,11,0.1)">\u{1F50D}</div>' +
    '<div><span class="step-num">'+t('portfolioAnalysis')+'</span><h3>'+t('coverageGaps')+'</h3></div></div>' +
    '<div class="section-body">';

  // Class coverage with chips
  html += '<div class="advice-item"><span class="label">'+t('classCoverage')+'</span>' +
    '<div class="nice-class-grid" style="margin-top:8px;">';
  allClasses.forEach(function(c) {
    html += '<div class="nice-chip current"><span class="chip-label">'+t('currentChip')+' \u2713</span>Class '+c+': '+niceLabel(c)+'</div>';
  });
  Array.from(suggestedClasses).slice(0,8).forEach(function(c) {
    html += '<div class="nice-chip suggested"><span class="chip-label">'+t('suggestedChip')+' \u2605</span>Class '+c+': '+niceLabel(c)+'</div>';
  });
  html += '</div></div>';

  if (suggestedClasses.size > 0) {
    html += '<div class="advice-item warning"><span class="label">'+t('expansionOpp')+'</span>' +
      t('considerDefensive')+' '+Array.from(suggestedClasses).slice(0,10).map(function(c){return '<strong>Class '+c+' ('+niceLabel(c)+')</strong>';}).join(', ')+'.</div>';
  }

  html += '<div class="advice-item"><span class="label">'+t('geoCoverage')+'</span>'+t('activeIn')+' '+allJuris.join(', ')+'. '+(allJuris.length<3?'<span style="color:var(--orange)">'+t('considerMadrid')+'</span>':t('goodGeoDiversity'))+'</div>';

  // Maintenance alerts
  var urgentMarks = normalizedMarks.filter(function(m){return m.status==='renewal'||m.status==='post-reg';});
  if (urgentMarks.length > 0) {
    html += '<div class="advice-item danger"><span class="label">'+t('maintenanceAlerts')+'</span>'+urgentMarks.map(function(m){return '<strong>'+m.mark+'</strong> ('+statusLabel(STATUS_META[m.status])+')';}).join(', ')+' \u2014 '+t('maintenanceText')+'</div>';
  }

  html += '</div></div>';
  return html;
}

// ═══════════════════════════════════════════════
// MARK DETAIL OVERLAY
// ═══════════════════════════════════════════════
function showMarkDetail(idx) {
  const m = normalizedMarks[idx];
  if (!m) return;
  const meta = STATUS_META[m.status] || STATUS_META['pending'];
  const risk = computeRisk(m);
  const now = new Date();

  let overlay = document.createElement('div');
  overlay.className = 'mark-detail-overlay';
  overlay.onclick = function(e) { if (e.target===overlay) overlay.remove(); };

  let html = '<div class="mark-detail-panel">' +
    '<div class="mark-detail-header">' +
    '<div style="flex:1"><h2>'+m.mark+' '+meta.symbol+' <span class="risk-badge risk-'+risk.toLowerCase()+'" style="margin-left:8px;font-size:11px;">'+risk+'</span></h2>' +
    '<div style="font-size:12px;color:#94a3b8;margin-top:2px;">'+m.jurisdictions.join(', ')+' \u2022 '+(m.classes.length?m.classes.map(function(c){return 'Class '+c;}).join(', '):'—')+'</div></div>' +
    '<button class="close-btn" onclick="this.closest(\'.mark-detail-overlay\').remove()">\u2715</button></div>' +
    '<div class="mark-detail-body">';

  // SOP 1: Status Audit
  html += buildDetailSection(1, '\u{1F50D}', t('sopStatusAudit'), 'rgba(14,165,233,0.1)', buildStatusAudit(m, meta, now));
  // SOP 2: Risk Assessment
  html += buildDetailSection(2, '\u26a0', t('sopRiskAssessment'), 'rgba(249,115,22,0.1)', buildRiskAssessment(m));
  // SOP 3: Expansion
  html += buildDetailSection(3, '\u{1F680}', t('sopExpansion'), 'rgba(245,158,11,0.1)', buildExpansion(m));
  // SOP 4: Enforcement
  html += buildDetailSection(4, '\u2697', t('sopEnforcement'), 'rgba(239,68,68,0.1)', buildEnforcement(m));
  // SOP 5: Documentation
  html += buildDetailSection(5, '\u{1F4C4}', t('sopDocumentation'), 'rgba(16,185,129,0.1)', buildDocumentation(m, meta, now));

  html += '</div></div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}

function buildDetailSection(num, icon, title, bgColor, body) {
  return '<div class="report-section" style="margin-bottom:16px;">' +
    '<div class="section-header" onclick="toggleSection(this)">' +
    '<div class="section-icon" style="background:'+bgColor+'">'+icon+'</div>' +
    '<div><span class="step-num">'+t('sop')+' '+num+'</span><h3>'+title+'</h3></div></div>' +
    '<div class="section-body">'+body+'</div></div>';
}

function buildStatusAudit(m, meta, now) {
  let items = '';
  items += advice(t('currentStanding'),
    '<strong>'+m.mark+'</strong> '+meta.symbol+' '+t('isCurrStatus')+' <strong>'+statusLabel(meta)+'</strong> \u2014 '+m.jurisdictions.join(', ')+'.' +
    (m.classes.length ? ' '+t('coveredClasses')+': '+m.classes.map(function(c){return 'Class '+c+' ('+niceLabel(c)+')';}).join(', ')+'.' : '') +
    (m.goodsServices ? '<br>'+m.goodsServices : ''));

  if (meta.phase==='unprotected') items += advice(t('unregWarningTitle'), t('unregWarningText'), 'danger');
  if (m.status==='intent') items += advice(t('ituTitle'), t('ituText'), 'warning');
  if (m.status==='published') items += advice(t('pubTitle'), t('pubText'), 'warning');
  if (m.filingDate) {
    var days = daysBetween(new Date(m.filingDate), now);
    items += advice(t('filingTimeline'), days+' '+t('filedDaysAgo')+' ('+m.filingDate+'). '+(m.status==='pending'&&days>365?t('examLong'):t('examNormal')),
      m.status==='pending'&&days>365?'warning':'');
  }
  if (m.jurisdictions.length>1) items += advice(t('multiJuris'), t('multiJurisText'));
  return items;
}

function buildRiskAssessment(m) {
  let items = '';
  items += advice(t('noConflicts'), t('noConflictsText'), 'success');
  if (m.markType==='word') items += advice(t('wordMarkStrategy'), t('wordMarkText'));
  if (m.markType==='design'||m.markType==='composite') items += advice(t('designConsideration'), t('designText'));
  if (m.status==='pending'||m.status==='intent') items += advice(t('oaPreparedness'), t('oaText'), 'warning');
  return items;
}

function buildExpansion(m) {
  let items = '';
  var suggested = new Set();
  m.classes.forEach(function(c) { (EXPANSION_MAP[c]||[]).forEach(function(s) { if (m.classes.indexOf(s)===-1) suggested.add(s); }); });

  if (m.classes.length > 0) {
    var grid = '<div class="nice-class-grid">';
    m.classes.forEach(function(c) { grid += '<div class="nice-chip current"><span class="chip-label">'+t('currentChip')+' \u2713</span>Class '+c+': '+niceLabel(c)+'</div>'; });
    Array.from(suggested).slice(0,6).forEach(function(c) { grid += '<div class="nice-chip suggested"><span class="chip-label">'+t('suggestedChip')+' \u2605</span>Class '+c+': '+niceLabel(c)+'</div>'; });
    grid += '</div>';
    items += '<div class="advice-item">'+grid+'</div>';
  }
  if (suggested.size>0) {
    items += advice(t('defensiveFiling'), t('defensiveText1')+' '+m.classes.join(', ')+' '+t('defensiveText2')+' <strong>Classes '+Array.from(suggested).slice(0,6).join(', ')+'</strong> '+t('defensiveText3'));
  }

  var missing = ['USPTO','EUIPO','WIPO','CNIPA','JPO'].filter(function(j){return m.jurisdictions.indexOf(j)===-1;});
  if (missing.length>0 && m.jurisdictions.length<4) {
    items += advice(t('geoExpansion'), t('currentlyProtected')+' '+m.jurisdictions.join(', ')+' '+t('only')+' <strong>'+missing.slice(0,3).join(', ')+'</strong>. '+t('madridSuggestion'), 'warning');
  }
  items += advice(t('brandArch'), t('brandArchText'));
  return items;
}

function buildEnforcement(m) {
  let items = '';
  items += advice(t('proactiveMonitor'), t('proactiveText'), 'success');
  items += advice(t('onlineEnforce'), t('onlineText'));
  if (m.concerns) items += advice(t('specificConcerns'), m.concerns, 'warning');
  return items;
}

function buildDocumentation(m, meta, now) {
  let items = '';
  if (m.regDate) {
    var reg = new Date(m.regDate);
    var deadlines = [
      {action:t('sec8Decl'), date:new Date(reg.getFullYear()+5, reg.getMonth(), reg.getDate())},
      {action:t('sec8Deadline'), date:new Date(reg.getFullYear()+6, reg.getMonth(), reg.getDate())},
      {action:t('sec15'), date:new Date(reg.getFullYear()+5, reg.getMonth(), reg.getDate())},
      {action:t('sec9Opens'), date:new Date(reg.getFullYear()+9, reg.getMonth(), reg.getDate())},
      {action:t('sec9Deadline'), date:new Date(reg.getFullYear()+10, reg.getMonth(), reg.getDate())}
    ];
    var tableHTML = '<table class="data-table"><tr><th>'+t('action')+'</th><th>'+t('date')+'</th><th>'+t('status')+'</th></tr>';
    deadlines.forEach(function(d) {
      var isPast = d.date <= now;
      var daysUntil = daysBetween(now, d.date);
      var urgency = isPast ? '<span style="color:var(--red)">'+t('overdue')+'</span>' :
                    daysUntil<180 ? '<span style="color:var(--orange)">'+daysUntil+' '+t('daysWord')+' \u2014 '+t('urgent')+'</span>' :
                    daysUntil+' '+t('daysWord');
      tableHTML += '<tr><td>'+d.action+'</td><td>'+d.date.toISOString().split('T')[0]+'</td><td>'+urgency+'</td></tr>';
    });
    tableHTML += '</table>';
    items += '<div class="advice-item">'+tableHTML+'</div>';
  }
  items += advice(t('specimenTitle'), t('specimenText'));
  if (m.status==='registered'||m.status==='post-reg') items += advice(t('useItTitle'), t('useItText'), 'warning');
  items += advice(t('recordKeeping'), t('recordKeepingText'));
  return items;
}

// ═══════════════════════════════════════════════
// SECTION TOGGLE
// ═══════════════════════════════════════════════
function toggleSection(header) {
  var body = header.nextElementSibling;
  body.style.display = body.style.display==='none' ? 'block' : 'none';
}

document.addEventListener('DOMContentLoaded', function() {
  showUploadLanding();
});
</script>
